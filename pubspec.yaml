name: hikewise
description: "A mobile application for hiking trail recommendation in Terengganu using Hybrid Algorithms."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend & Authentication 
  supabase_flutter: ^2.0.2
  google_sign_in: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.6.0

  # Maps & Navigation
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0

  # State Management & UI Enhancement
  provider: ^6.1.1
  google_fonts: ^6.1.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/